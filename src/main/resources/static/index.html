<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Hello WebSocket</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <link rel="stylesheet" href="https://maxcdn.bootstrapcdn.com/bootstrap/3.3.7/css/bootstrap.min.css" integrity="sha384-BVYiiSIFeK1dGmJRAkycuHAHRg32OmUcww7on3RYdg4Va+PmSTsz/K68vbdEjh4u" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/@stomp/stompjs@7.0.0/bundles/stomp.umd.min.js"></script>
    <script src="/app.js"></script>
</head>
<body>
<noscript><h2 style="color: #ff0000">Seems your browser doesn't support Javascript! Websocket relies on Javascript being
    enabled. Please enable
    Javascript and reload this page!</h2></noscript>
<div id="main-content" class="container">
    <div class="row">
        <div class="col-md-6">
            <form class="form-inline">
                <div class="form-group">
                    <label for="connect">WebSocket connection:</label>
                    <button id="connect" class="btn btn-default" type="submit">Connect</button>
                    <button id="disconnect" class="btn btn-default" type="submit" disabled="disabled">Disconnect
                    </button>
                </div>
            </form>
        </div>
        <div class="col-md-6">
            <form class="form-inline">
                <div class="form-group">
                    <label for="name">What is your name?</label>
                    <input type="text" id="name" class="form-control" placeholder="Your name here...">
                </div>
            </form>
        </div>
    </div>
    <div class="row">
        <div class="col-md-6">
            <h3>Public Chat</h3>
            <table id="conversation" class="table table-striped">
                <thead>
                <tr>
                    <th>Chat</th>
                </tr>
                </thead>
                <tbody id="chat">
                </tbody>
            </table>
            <div id="conversationDiv">
                <label for="text"></label>
                <input type="file" id="imageInput" accept="image/*">
                <input type="text" id="text" placeholder="Write a public message..."/>
                <button id="sendMessage" class="btn btn-default" type="submit">Send</button>
                <p id="response"></p>
            </div>
        </div>
        <div class="col-md-6">
            <h3>Private Chat</h3>
            <table id="privateConversation" class="table table-striped">
                <thead>
                <tr>
                    <th>Private Chat</th>
                </tr>
                </thead>
                <tbody id="privateChat">
                </tbody>
            </table>
            <div id="privateConversationDiv">
                <div class="form-group">
                    <label for="recipient">Recipient:</label>
                    <input type="text" id="recipient" class="form-control" placeholder="Recipient's name..."/>
                </div>
                <div class="form-group">
                    <label for="privateText"></label>
                    <input type="text" id="privateText" class="form-control" placeholder="Write a private message..."/>
                    <button id="sendPrivateMessage" class="btn btn-default" type="submit">Send</button>
                </div>
                <p id="privateResponse"></p>
            </div>
        </div>
    </div>
</div>
</body>
</html>
